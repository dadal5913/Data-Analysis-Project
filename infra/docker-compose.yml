services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: ${UPLOAD_DIR}
      WS_PRICE_SYMBOLS: ${WS_PRICE_SYMBOLS}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ../backend:/app
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
